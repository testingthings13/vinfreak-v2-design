{% extends "_base.html" %}
{% block content %}
<section class="page-header">
  <div>
    <h1>Edit {{ make.name }}</h1>
    <p class="muted">Refresh artwork or rename the badge. Changes take effect instantly.</p>
  </div>
</section>

<section class="admin-section">
  <article class="card-panel">
    <header class="card-panel__header">
      <div>
        <h2>Brand asset</h2>
        <p class="muted small">{{ car_count }} car(s) currently linked to this logo.</p>
      </div>
    </header>
    <div class="card-panel__body">
      <form class="form elevated" action="/admin/car-logos/{{ make.id }}" method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf" value="{{ csrf }}">
        <div class="form-grid two">
          <label><span>Brand name</span><input type="text" name="name" value="{{ make.name }}" required></label>
          <label><span>Logo file</span><input type="file" name="logo" accept="image/*"></label>
        </div>
        {% if make.logo_url %}
        <div class="preview"><img src="{{ make.logo_url }}" alt="{{ make.name }} logo" style="height:80px"></div>
        <label class="checkbox"><input type="checkbox" name="remove_logo" value="1"> <span>Remove existing logo</span></label>
        {% endif %}
        <div class="form-actions">
          <button type="submit" class="button primary">Save changes</button>
        </div>
      </form>
    </div>
  </article>
</section>
{% endblock %}
