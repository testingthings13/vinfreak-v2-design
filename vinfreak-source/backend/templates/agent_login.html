<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "Agent Login" }}</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body class="login-shell">
  <article class="card-panel login-panel">
    <div class="brand-mark">
      <div class="brand-mark__logo">VF</div>
      <div>
        <h1>VINFREAK Agent</h1>
        <p class="muted">Sign in with your assigned agent credentials.</p>
      </div>
    </div>
    {% if error %}<div class="flash error">{{ error }}</div>{% endif %}
    <form class="form elevated" method="post" action="/agents/login">
      <input type="hidden" name="csrf" value="{{ csrf_token(request) }}"/>
      <label>
        <span>Username</span>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </label>
      <label>
        <span>Password</span>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </label>
      <div class="form-actions">
        <button class="button primary" type="submit">Sign in</button>
      </div>
    </form>
    <footer>
      <span>Need access? Contact your administrator.</span>
    </footer>
  </article>
</body>
</html>
