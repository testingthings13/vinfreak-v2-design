{% extends "_base.html" %}
{% block content %}
<section class="page-header">
  <div>
    <h1>Edit {{ dealership.name }}</h1>
    <p class="muted">Update branding or location details for this partner.</p>
  </div>
</section>

<section class="admin-section">
  <article class="card-panel">
    <header class="card-panel__header">
      <div>
        <h2>Dealership profile</h2>
        <p class="muted small">Changes propagate to connected listings immediately.</p>
      </div>
    </header>
    <div class="card-panel__body">
      <form class="form elevated" action="/admin/dealerships/{{ dealership.id }}" method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf" value="{{ csrf }}">
        <div class="form-grid two">
          <label><span>Name</span><input type="text" name="name" value="{{ dealership.name }}" required></label>
          <label><span>Location</span><input type="text" name="location" value="{{ dealership.location or '' }}" placeholder="City, ST"></label>
          <label><span>Logo file</span><input type="file" name="logo"></label>
        </div>
        {% if dealership.logo_url %}
        <div class="preview"><img src="{{ dealership.logo_url }}" alt="logo" style="height:80px"></div>
        <label class="checkbox"><input type="checkbox" name="remove_logo" value="1"> <span>Remove existing logo</span></label>
        {% endif %}
        <div class="form-actions">
          <button type="submit" class="button primary">Save changes</button>
        </div>
      </form>
    </div>
  </article>
</section>
{% endblock %}
