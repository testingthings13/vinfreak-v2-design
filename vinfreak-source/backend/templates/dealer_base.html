<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{{ title or "Dealer Portal" }}</title>
  <link href="/static/admin.css" rel="stylesheet"/>
</head>
<body>
  <header class="topbar sticky">
    <div class="brand">
      <a href="{{ portal_base }}">VINFREAK Dealer Hub</a>
    </div>
    <nav>
      <a href="{{ portal_base }}">Dashboard</a>
      <a href="{{ portal_base }}/inventory/new">Add listing</a>
      <a href="{{ portal_base }}/profile">Profile</a>
      <a href="{{ portal_base }}/logout">Logout</a>
    </nav>
  </header>

  {% if flash and flash|length %}
    <div class="flash-wrap">
      {% for f in flash %}
        <div class="flash {{ f.cat }}">{{ f.msg }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="page{% if page_class %} {{ page_class }}{% endif %}">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
